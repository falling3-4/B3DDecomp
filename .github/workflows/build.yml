name: Build Blitz3DDecomp Suite

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.x

    - name: Restore Dependencies
      run: dotnet restore Blitz3DDecomp.sln

    - name: Build and Publish Suite
      run: |
        dotnet publish Blitz3DDecomp.sln `
          --configuration Release `
          --output ./publish `
          --runtime win-x64 `
          --self-contained false `
          -p:PublishReadyToRun=true

    - name: Zip Release
      run: |
        Compress-Archive -Path ./publish/* -DestinationPath Blitz3DDecomp_v${{ github.run_number }}.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Blitz3DDecomp-Win64
        path: Blitz3DDecomp_v${{ github.run_number }}.zip
